<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KW Spa Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Newsreader:opsz,wght@6..72,500;6..72,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="admin-body">
    <main class="admin-shell">
      <div class="admin-top">
        <div>
          <p class="eyebrow">Local dashboard</p>
          <h1>KW Spa Admin</h1>
        </div>
        <div class="admin-actions">
          <label>
            Admin token
            <input id="tokenInput" value="demo-admin">
          </label>
          <a class="primary-button" href="/">View website</a>
        </div>
      </div>

      <section class="admin-grid">
        <form class="admin-panel" id="businessForm">
          <h2>Business details</h2>
          <label>Name<input name="name"></label>
          <label>Tagline<input name="tagline"></label>
          <label>Address<input name="address"></label>
          <label>Phone<input name="phone"></label>
          <label>Hours<input name="hours"></label>
          <label>Booking URL<input name="bookingUrl"></label>
          <button class="primary-button" type="submit">Save details</button>
          <p class="form-status" id="businessStatus"></p>
        </form>

        <section class="admin-panel">
          <h2>Services and prices</h2>
          <div id="serviceEditors"></div>
          <button class="primary-button" id="saveServices" type="button">Save services</button>
          <p class="form-status" id="serviceStatus"></p>
        </section>

        <section class="admin-panel">
          <h2>Booking requests</h2>
          <div class="admin-list" id="bookingList"></div>
        </section>

        <section class="admin-panel">
          <h2>Contact leads</h2>
          <div class="admin-list" id="leadList"></div>
        </section>
      </section>
    </main>

    <script src="/admin.js"></script>
  </body>
</html>
